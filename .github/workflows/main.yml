---
name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev --locked

      - uses: j178/prek-action@0bb87d7f00b0c99306c8bcb8b8beba1eb581c037 # v1.1.1
        with:
          extra-args: --all-files --verbose --skip no-commit-to-branch

  tests:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev --locked

      - name: Collect static files
        run: |
          uv run django-admin collectstatic --noinput

      - name: Run tests
        id: tests
        run: |
          set -o pipefail
          echo 'stdout<<EOF' > "$GITHUB_OUTPUT"
          uv run pytest --cov 2>&1 | tee -a "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Add PR Comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: test_results
          message: |
            # Test results :white_check_mark:
            ```
            ${{ steps.tests.outputs.stdout }}
            ```

      - name: Remove PR Comment on failure
        if: failure()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: test_results
          delete: true

  docker:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build Docker image
        run: |
          docker build -t dailyword:test .

  home-assistant-build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Test build
        uses: home-assistant/builder@6cb4fd3d1338b6e22d0958a4bcb53e0965ea63b4 # 2026.02.1 # zizmor: ignore[unpinned-uses] this needs to be pinned to a version, since it's used both for the action and the underlying Docker image
        with:
          args: |
            --test \
            --amd64 \
            --aarch64 \
            --target . \
            --image dailyword \
            --docker-hub serl
